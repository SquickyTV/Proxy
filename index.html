<!DOCTYPE html>
<html>
<head>
  <title>Proxy</title>
  <style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    overflow: hidden;
    background: black;
  }
  #virtualComputerDiv {
    cursor: none;
    width: 100vw;
    height: 100vh;
  }
</style>
</head>
<body>

  
  <div id="virtualComputerDiv" style="cursor:none; width:100vw; height:100vh; display:block;"></div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(registrations => {
        for (let reg of registrations) {
          reg.unregister();
        }
      });
      navigator.serviceWorker.getRegistrations().then(r => {
        if (r.length > 0) location.reload();
      });
    }
  </script>

<script type="module">
  import Hyperbeam from "https://unpkg.com/@hyperbeam/web@latest/dist/index.js"

  const resp = await fetch("/computer")
  const data = await resp.json()

  if (!data.embed_url) {
    document.body.innerText = "No sessions available, please try again later."
  } else {
    const hb = await Hyperbeam(virtualComputerDiv, data.embed_url)

    // Free the session when user leaves
    window.addEventListener("beforeunload", () => {
      navigator.sendBeacon(`/computer/${data.session_id}`, JSON.stringify({ method: "DELETE" }))
    })
  }
</script>
</body>
</html>
