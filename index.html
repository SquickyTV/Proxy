<!DOCTYPE html>
<html>
<head>
  <title>Proxy</title>
  <style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    overflow: hidden;
    background: black;
  }
  #virtualComputerDiv {
    cursor: none;
    width: 100vw;
    height: 100vh;
  }
</style>
</head>
<body>

  
  <div id="virtualComputerDiv" style="cursor:none; width:100vw; height:100vh; display:block;"></div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(registrations => {
        for (let reg of registrations) {
          reg.unregister();
        }
      });
      navigator.serviceWorker.getRegistrations().then(r => {
        if (r.length > 0) location.reload();
      });
    }
  </script>

  <script type="module">
    import Hyperbeam from "https://unpkg.com/@hyperbeam/web@latest/dist/index.js"
    const resp = await fetch("/computer")
    const data = await resp.json()
    if (!data.embed_url) {
      console.error("No embed_url! Got:", JSON.stringify(data))
    } else {
      const hb = await Hyperbeam(virtualComputerDiv, data.embed_url)
      hb.tabs.onUpdated.addListener((tabId, changeInfo) => {
        if (changeInfo.title)
          currentSite.innerText = changeInfo.title
      })
    }
  </script>

</body>
</html>
